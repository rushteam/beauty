name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  core:
    name: core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "not gofmt-ed:"; echo "$out"; exit 1; fi
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test -race -timeout 600s ./...
      - name: no contrib pollution
        run: |
          if go list -deps ./... | grep -q 'github.com/rushteam/beauty/contrib'; then
            echo "core must not import contrib/ modules"; exit 1
          fi
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  contrib:
    name: contrib (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [gorm, sqldb, elasticsearch, nats, natsjs, kafka, llm, vector, mcp]
    defaults:
      run:
        working-directory: contrib/${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
          cache-dependency-path: contrib/${{ matrix.module }}/go.sum
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "not gofmt-ed:"; echo "$out"; exit 1; fi
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race -timeout 300s ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  tools:
    name: tools
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
          cache-dependency-path: tools/go.sum
      - run: go build ./...
      - run: go vet ./...
